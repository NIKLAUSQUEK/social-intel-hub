<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Competitor Discovery — Social Intel</title>
  <style>
    :root {
      --bg:#0B1020; --panel:#141A2E; --panel-2:#1A2140;
      --text:#E6E8EF; --muted:#8B92A8; --accent:#7C5CFF;
      --ok:#4ADE80; --warn:#FBBF24; --err:#FF6B6B;
      --line:rgba(255,255,255,0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 24px;
    }
    header {
      display: flex; justify-content: space-between; align-items: flex-start;
      gap: 16px; flex-wrap: wrap; margin-bottom: 20px;
    }
    h1 { margin: 0; font-size: 22px; font-weight: 700; }
    .sub { color: var(--muted); font-size: 13px; margin-top: 4px; }
    select, button, input {
      background: var(--panel); color: var(--text);
      border: 1px solid var(--line); border-radius: 8px;
      padding: 8px 12px; font-size: 13px; cursor: pointer;
      font-family: inherit;
    }
    button.primary { background: var(--accent); border-color: var(--accent); font-weight: 600; }
    button.primary:hover { filter: brightness(1.1); }
    button.approve { background: var(--ok); border-color: var(--ok); color: #000; font-weight: 600; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

    .suggestion-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 14px;
      margin-top: 16px;
    }
    .suggestion {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 18px;
      position: relative;
      transition: all 0.15s;
    }
    .suggestion.selected {
      border-color: var(--accent);
      background: rgba(124,92,255,0.04);
    }
    .suggestion-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 6px;
    }
    .suggestion-name {
      font-weight: 700;
      font-size: 16px;
      line-height: 1.3;
    }
    .threat, .geo-pill {
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 700;
      flex-shrink: 0;
    }
    .threat.high   { background: rgba(255,107,107,0.15); color: var(--err); }
    .threat.medium { background: rgba(251,191,36,0.15); color: var(--warn); }
    .threat.low    { background: rgba(255,255,255,0.05); color: var(--muted); }
    .geo-pill.local    { background: rgba(74,222,128,0.14); color: var(--ok); }
    .geo-pill.global   { background: rgba(96,165,250,0.14); color: #60a5fa; }
    .geo-pill.adjacent { background: rgba(244,114,182,0.14); color: #f472b6; }
    .pill-row { display:flex; gap:6px; flex-wrap:wrap; }
    .similarity-bar {
      height: 4px;
      background: rgba(255,255,255,0.05);
      border-radius: 2px;
      margin: 10px 0 12px;
      overflow: hidden;
    }
    .similarity-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #c084fc);
      transition: width 0.3s;
    }
    .rationale {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      margin: 8px 0 10px;
    }
    .handles {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    .handle {
      font-size: 11px;
      color: var(--accent);
      background: rgba(124,92,255,0.1);
      padding: 4px 10px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 500;
    }
    .handle:hover { background: rgba(124,92,255,0.2); }
    .category {
      font-size: 11px;
      color: var(--muted);
      margin-top: 6px;
      font-style: italic;
    }
    .similarity-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .checkbox {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 24px; height: 24px;
      border-radius: 50%;
      border: 2px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: var(--bg);
    }
    .suggestion.selected .checkbox {
      border-color: var(--accent);
      background: var(--accent);
      color: white;
    }

    .empty {
      padding: 60px 20px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: 12px;
      margin-top: 20px;
    }
    .summary-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 18px;
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 10px;
      margin-top: 16px;
    }
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(124,92,255,0.3);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>🎯 Competitor Discovery</h1>
      <div class="sub">Exa + AI-ranked suggestions. Approve the ones you want — they'll be added to the client's competitor list.</div>
    </div>
    <div class="controls">
      <select id="clientSelect"></select>
      <select id="geoFilter">
        <option value="all">All competitors</option>
        <option value="local">🏠 Local only</option>
        <option value="global">🌍 Global only</option>
        <option value="adjacent">🔀 Adjacent only</option>
      </select>
      <button class="primary" id="runBtn">✨ Run discovery</button>
    </div>
  </header>

  <div id="content"></div>

  <script>
    const clientSelect = document.getElementById('clientSelect');
    const runBtn = document.getElementById('runBtn');
    const content = document.getElementById('content');
    const urlClient = new URLSearchParams(location.search).get('client');
    const selected = new Set();

    async function loadClients() {
      const res = await fetch('/api/clients');
      const json = await res.json();
      const list = (json.data || json).filter(c => c.active !== false);
      list.sort((a, b) => a.name.localeCompare(b.name));
      clientSelect.innerHTML = list.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
      if (urlClient && list.some(c => c.id === urlClient)) clientSelect.value = urlClient;
      loadSuggestions();
    }

    async function loadSuggestions() {
      const clientId = clientSelect.value;
      if (!clientId) return;
      selected.clear();
      content.innerHTML = '<div class="empty"><span class="spinner"></span> Loading…</div>';
      try {
        const res = await fetch(`/api/competitor-discovery/${encodeURIComponent(clientId)}`);
        if (res.status === 404) {
          content.innerHTML = `<div class="empty">
            <div style="font-size:15px;margin-bottom:6px;">No suggestions yet for <strong>${escapeHtml(clientId)}</strong></div>
            <div style="font-size:12px;">Click ✨ Run discovery to scan web + rank the 8-12 strongest competitors.</div>
          </div>`;
          return;
        }
        const json = await res.json();
        window.__lastSuggestionData = json.data;
        render(json.data);
      } catch (err) {
        content.innerHTML = `<div class="empty">Error: ${escapeHtml(err.message)}</div>`;
      }
    }

    function geoLabel(g) {
      if (g === 'local') return '🏠 local';
      if (g === 'global') return '🌍 global';
      if (g === 'adjacent') return '🔀 adjacent';
      return g;
    }

    function render(d) {
      const when = d.generatedAt ? new Date(d.generatedAt).toLocaleString('en-GB') : '';
      const geoFilter = document.getElementById('geoFilter').value;
      const filtered = geoFilter === 'all'
        ? (d.suggestions || [])
        : (d.suggestions || []).filter(s => (s.geography || 'global') === geoFilter);
      const cards = filtered.map(s => renderCard(s)).join('');
      const geoCounts = (d.suggestions || []).reduce((acc, s) => {
        const g = s.geography || 'global';
        acc[g] = (acc[g] || 0) + 1;
        return acc;
      }, {});
      content.innerHTML = `
        <div class="summary-bar">
          <div style="font-size:13px;color:var(--muted);">
            <strong style="color:var(--text);">${d.suggestionCount || 0} suggestions</strong>
            (🏠 ${geoCounts.local || 0} local · 🌍 ${geoCounts.global || 0} global · 🔀 ${geoCounts.adjacent || 0} adjacent)
            · generated ${escapeHtml(when)}
          </div>
          <div>
            <span id="selectedCount" style="margin-right:14px;color:var(--muted);font-size:12px;">0 selected</span>
            <button class="approve" id="approveBtn" disabled>✓ Add selected to client</button>
          </div>
        </div>
        <div class="suggestion-grid">${cards || '<div class="empty">No valid suggestions found.</div>'}</div>
      `;

      document.querySelectorAll('.suggestion').forEach(el => {
        el.addEventListener('click', () => toggle(el.dataset.name));
      });
      document.getElementById('approveBtn').addEventListener('click', approve);
    }

    function renderCard(s) {
      const platforms = s.platforms || {};
      const handles = [];
      if (platforms.instagram) handles.push(`<a class="handle" href="${escapeHtml(platforms.instagram)}" target="_blank">IG</a>`);
      if (platforms.tiktok)    handles.push(`<a class="handle" href="${escapeHtml(platforms.tiktok)}" target="_blank">TikTok</a>`);
      if (platforms.linkedin)  handles.push(`<a class="handle" href="${escapeHtml(platforms.linkedin)}" target="_blank">LinkedIn</a>`);
      const sim = s.similarity || 0;

      return `
        <div class="suggestion" data-name="${escapeHtml(s.name)}">
          <div class="checkbox">✓</div>
          <div class="suggestion-header" style="padding-right:32px;">
            <div class="suggestion-name">${escapeHtml(s.name)}</div>
            <div class="pill-row">
              ${s.geography ? `<span class="geo-pill ${s.geography}">${geoLabel(s.geography)}</span>` : ''}
              <span class="threat ${(s.threatLevel || 'low').toLowerCase()}">${escapeHtml(s.threatLevel || 'low')}</span>
            </div>
          </div>
          <div class="similarity-label">Similarity ${sim}/100</div>
          <div class="similarity-bar"><div class="similarity-fill" style="width:${sim}%"></div></div>
          <div class="rationale">${escapeHtml(s.rationale || '')}</div>
          ${s.extra?.strengths?.length ? `
            <div style="font-size:11px;color:var(--muted);margin-top:6px;">
              <strong style="color:var(--text);font-weight:600;">Strengths:</strong> ${s.extra.strengths.slice(0,3).map(escapeHtml).join(' · ')}
            </div>` : ''}
          ${s.extra?.contentStyle ? `
            <div style="font-size:11px;color:var(--muted);margin-top:4px;">
              <strong style="color:var(--text);font-weight:600;">Style:</strong> ${escapeHtml(s.extra.contentStyle)}
            </div>` : ''}
          ${s.category ? `<div class="category">${escapeHtml(s.category)}</div>` : ''}
          <div class="handles">${handles.join('')}</div>
        </div>
      `;
    }

    function toggle(name) {
      if (!name) return;
      if (selected.has(name)) selected.delete(name);
      else selected.add(name);
      document.querySelectorAll('.suggestion').forEach(el => {
        el.classList.toggle('selected', selected.has(el.dataset.name));
      });
      document.getElementById('selectedCount').textContent = selected.size + ' selected';
      document.getElementById('approveBtn').disabled = selected.size === 0;
    }

    async function approve() {
      const clientId = clientSelect.value;
      if (!selected.size) return;
      if (!confirm(`Add ${selected.size} competitors to ${clientId}? This writes to clients.json and enables scraping them on the next run.`)) return;

      const btn = document.getElementById('approveBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Saving…';

      try {
        const res = await fetch(`/api/competitor-discovery/${encodeURIComponent(clientId)}/apply`, {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ approvedNames: [...selected] }),
        });
        const json = await res.json();
        if (!json.success) throw new Error(json.error);
        alert(`Added ${json.data.added}. ${json.data.skipped ? json.data.skipped + ' skipped (duplicates).' : ''} Client now tracks ${json.data.totalNow} competitors.`);
        selected.clear();
        loadSuggestions();
      } catch (err) {
        alert('Failed: ' + err.message);
      } finally {
        btn.disabled = false;
        btn.innerHTML = '✓ Add selected to client';
      }
    }

    runBtn.addEventListener('click', async () => {
      const clientId = clientSelect.value;
      if (!clientId) return;
      if (!confirm(`Run competitor discovery for ${clientId}? Uses Exa + Sonnet, takes 30-90s, costs ~$0.04.`)) return;
      runBtn.disabled = true;
      runBtn.innerHTML = '<span class="spinner"></span> Discovering…';
      try {
        const res = await fetch(`/api/competitor-discovery/${encodeURIComponent(clientId)}/suggest`, { method: 'POST' });
        const json = await res.json();
        if (!json.success) throw new Error(json.error);
        loadSuggestions();
      } catch (err) {
        alert('Discovery failed: ' + err.message);
      } finally {
        runBtn.disabled = false;
        runBtn.innerHTML = '✨ Run discovery';
      }
    });

    clientSelect.addEventListener('change', loadSuggestions);
    document.getElementById('geoFilter').addEventListener('change', () => {
      // re-render from cached suggestions
      const cached = window.__lastSuggestionData;
      if (cached) render(cached);
    });

    function escapeHtml(s) {
      return String(s || '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    }

    loadClients();
  </script>
</body>
</html>
