<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trending Edits + SFX — Social Intel</title>
  <style>
    :root {
      --bg:#0B1020; --panel:#141A2E; --panel-2:#1A2140;
      --text:#E6E8EF; --muted:#8B92A8; --accent:#7C5CFF;
      --cyan:#22D3EE; --pink:#F472B6; --ok:#4ADE80; --warn:#FBBF24; --err:#FF6B6B;
      --line:rgba(255,255,255,0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 24px;
      font-family: ui-sans-serif, system-ui, 'Inter', sans-serif;
      background: var(--bg); color: var(--text);
    }
    header {
      display:flex; justify-content:space-between; align-items:flex-start;
      gap:16px; flex-wrap:wrap; margin-bottom:20px;
    }
    h1 { margin:0; font-size:22px; font-weight:700; }
    .sub { color:var(--muted); font-size:13px; margin-top:4px; }
    .meta { color:var(--muted); font-size:12px; margin-top:6px; }
    .beta-pill {
      background:rgba(244,114,182,0.15); color:var(--pink);
      padding:2px 10px; border-radius:999px; font-size:10px;
      text-transform:uppercase; letter-spacing:1px; font-weight:700;
    }

    select, button, input {
      background:var(--panel); color:var(--text);
      border:1px solid var(--line); border-radius:8px;
      padding:8px 12px; font-size:13px; cursor:pointer;
      font-family:inherit;
    }
    button.primary { background:var(--accent); border-color:var(--accent); font-weight:600; }
    button:disabled { opacity:0.5; cursor:not-allowed; }

    .controls { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    input[type=text] { min-width:220px; cursor:text; }

    .tab-row {
      display:flex; gap:6px; margin:16px 0;
      border-bottom:1px solid var(--line);
      padding-bottom:0;
    }
    .tab {
      padding:8px 16px; background:none; border:none;
      color:var(--muted); font-size:13px; cursor:pointer;
      border-bottom:2px solid transparent; border-radius:0;
      transition:all 0.15s;
    }
    .tab.active { color:var(--accent); border-bottom-color:var(--accent); font-weight:600; }
    .tab:hover { color:var(--text); }
    .tab-count { opacity:0.6; font-size:11px; margin-left:4px; }

    .grid {
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(340px, 1fr));
      gap:14px;
    }
    .card {
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:12px;
      padding:18px;
      position:relative;
      transition:border-color 0.15s;
    }
    .card:hover { border-color:var(--accent); }
    .card.edit::before {
      content:''; position:absolute; top:0; left:0; bottom:0; width:3px;
      background:var(--accent); border-radius:12px 0 0 12px;
    }
    .card.sfx::before {
      content:''; position:absolute; top:0; left:0; bottom:0; width:3px;
      background:var(--pink); border-radius:12px 0 0 12px;
    }

    .card-header { display:flex; justify-content:space-between; align-items:flex-start; gap:8px; margin-bottom:8px; }
    .name { font-weight:700; font-size:15px; line-height:1.3; }
    .type-pill {
      font-size:10px; padding:3px 8px; border-radius:4px;
      text-transform:uppercase; letter-spacing:0.05em; font-weight:700;
      flex-shrink:0;
    }
    .type-pill.edit { background:rgba(124,92,255,0.15); color:var(--accent); }
    .type-pill.sfx  { background:rgba(244,114,182,0.15); color:var(--pink); }

    .desc { color:var(--text); font-size:13px; line-height:1.5; margin-bottom:10px; }
    .vibe { color:var(--muted); font-size:12px; font-style:italic; margin-bottom:8px; }

    .section-label {
      font-size:10px; color:var(--muted);
      text-transform:uppercase; letter-spacing:0.08em;
      font-weight:600; margin-top:10px; margin-bottom:4px;
    }
    .tags { display:flex; flex-wrap:wrap; gap:4px; }
    .tag {
      background:var(--panel-2); color:var(--muted);
      padding:3px 8px; border-radius:4px; font-size:11px;
    }
    .tag.cyan { color:var(--cyan); background:rgba(34,211,238,0.08); }
    .tag.ok { color:var(--ok); background:rgba(74,222,128,0.08); }
    .tag.warn { color:var(--warn); background:rgba(251,191,36,0.08); }

    .example {
      background:rgba(124,92,255,0.06);
      border-left:2px solid var(--accent);
      padding:10px 12px; border-radius:4px;
      font-size:12px; line-height:1.5; color:var(--text);
      margin-top:6px;
    }

    .difficulty {
      display:inline-block; font-size:10px; padding:2px 8px;
      border-radius:4px; font-weight:700; text-transform:uppercase; letter-spacing:0.05em;
    }
    .difficulty.easy     { background:rgba(74,222,128,0.12); color:var(--ok); }
    .difficulty.moderate { background:rgba(251,191,36,0.12); color:var(--warn); }
    .difficulty.advanced { background:rgba(255,107,107,0.12); color:var(--err); }

    .source-hint { font-size:11px; color:var(--muted); font-style:italic; line-height:1.4; margin-top:10px; }

    .link-row { display:flex; gap:6px; flex-wrap:wrap; margin-top:6px; }
    .link-pill {
      font-size:11px; padding:4px 10px; border-radius:999px;
      text-decoration:none; display:inline-flex; align-items:center; gap:4px;
      font-weight:600; transition:all 0.15s;
    }
    .link-pill.tiktok   { background:rgba(34,211,238,0.12); color:var(--cyan); border:1px solid rgba(34,211,238,0.25); }
    .link-pill.youtube  { background:rgba(255,107,107,0.12); color:var(--err);  border:1px solid rgba(255,107,107,0.25); }
    .link-pill.tutorial { background:rgba(124,92,255,0.12); color:var(--accent); border:1px solid rgba(124,92,255,0.25); }
    .link-pill.example  { background:rgba(74,222,128,0.12); color:var(--ok);     border:1px solid rgba(74,222,128,0.25); }
    .link-pill:hover { filter:brightness(1.3); transform:translateY(-1px); }

    .empty {
      padding:60px 20px; text-align:center; color:var(--muted);
      font-size:14px; border:1px dashed var(--line); border-radius:12px;
    }
    .spinner {
      display:inline-block; width:16px; height:16px;
      border:2px solid rgba(124,92,255,0.3); border-top-color:var(--accent);
      border-radius:50%; animation:spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>
        🎬 Trending Edits + SFX
        <span class="beta-pill">Beta</span>
      </h1>
      <div class="sub">Viral editing techniques and non-music sound effects from web research. Updated on demand.</div>
      <div class="meta" id="metaLine"></div>
    </div>
    <div class="controls">
      <input type="text" id="searchInput" placeholder="Filter by name, vibe, tool…" />
      <select id="difficultyFilter">
        <option value="all">All difficulties</option>
        <option value="easy">Easy</option>
        <option value="moderate">Moderate</option>
        <option value="advanced">Advanced</option>
      </select>
      <button class="primary" id="refreshBtn">✨ Refresh feed</button>
    </div>
  </header>

  <div class="tab-row" id="tabRow"></div>

  <div id="list"></div>

  <script>
    const tabRow = document.getElementById('tabRow');
    const list = document.getElementById('list');
    const metaLine = document.getElementById('metaLine');
    const searchInput = document.getElementById('searchInput');
    const difficultyFilter = document.getElementById('difficultyFilter');
    const refreshBtn = document.getElementById('refreshBtn');

    let data = null;
    let currentTab = 'all';

    async function load() {
      list.innerHTML = '<div class="empty"><span class="spinner"></span> Loading…</div>';
      try {
        const res = await fetch('/api/trending-techniques');
        if (res.status === 404) {
          list.innerHTML = `<div class="empty">
            <div style="font-size:15px;margin-bottom:6px;">No data yet</div>
            <div style="font-size:12px;">Click ✨ Refresh feed to scan the web.</div>
          </div>`;
          return;
        }
        const json = await res.json();
        data = json.data;
        renderTabs();
        render();
      } catch (err) {
        list.innerHTML = `<div class="empty">Error: ${escapeHtml(err.message)}</div>`;
      }
    }

    function renderTabs() {
      const all = data.count || 0;
      const edits = data.editCount || 0;
      const sfx = data.sfxCount || 0;
      tabRow.innerHTML = `
        <button class="tab ${currentTab==='all'?'active':''}" data-tab="all">All <span class="tab-count">${all}</span></button>
        <button class="tab ${currentTab==='edit'?'active':''}" data-tab="edit">🎬 Edits <span class="tab-count">${edits}</span></button>
        <button class="tab ${currentTab==='sfx'?'active':''}" data-tab="sfx">🔊 SFX <span class="tab-count">${sfx}</span></button>
      `;
      tabRow.querySelectorAll('.tab').forEach(b => {
        b.addEventListener('click', () => {
          currentTab = b.dataset.tab;
          renderTabs();
          render();
        });
      });
    }

    function render() {
      const q = (searchInput.value || '').toLowerCase();
      const diff = difficultyFilter.value;
      const refreshed = data?.refreshedAt ? new Date(data.refreshedAt).toLocaleString('en-GB') : '';
      metaLine.innerHTML = `<strong>${data.count}</strong> techniques · ${data.month} feed · refreshed ${escapeHtml(refreshed)}`;

      const visible = (data.techniques || []).filter(t => {
        if (currentTab !== 'all' && t.type !== currentTab) return false;
        if (diff !== 'all' && (t.difficulty || 'moderate') !== diff) return false;
        if (q) {
          const hay = [t.name, t.vibe, t.description, t.category,
                       ...(t.whenToUse||[]), ...(t.toolsNeeded||[]),
                       ...(t.creatorArchetypes||[])].join(' ').toLowerCase();
          if (!hay.includes(q)) return false;
        }
        return true;
      });

      if (!visible.length) {
        list.innerHTML = `<div class="empty">No techniques match current filters.</div>`;
        return;
      }
      list.innerHTML = `<div class="grid">${visible.map(renderCard).join('')}</div>`;
    }

    function renderCard(t) {
      const whenUse = (t.whenToUse || []).slice(0, 3).map(x => `<span class="tag">${escapeHtml(x)}</span>`).join('');
      const tools = (t.toolsNeeded || []).slice(0, 4).map(x => `<span class="tag cyan">${escapeHtml(x)}</span>`).join('');
      const archetypes = (t.creatorArchetypes || []).slice(0, 4).map(x => `<span class="tag ok">${escapeHtml(x)}</span>`).join('');
      const pairs = (t.pairsWellWith || []).slice(0, 3).map(x => `<span class="tag warn">${escapeHtml(x)}</span>`).join('');

      return `
        <div class="card ${t.type || 'edit'}">
          <div class="card-header">
            <div class="name">${escapeHtml(t.name)}</div>
            <span class="type-pill ${t.type || 'edit'}">${t.type === 'sfx' ? 'SFX' : 'edit'}</span>
          </div>
          ${t.description ? `<div class="desc">${escapeHtml(t.description)}</div>` : ''}
          ${t.vibe ? `<div class="vibe">${escapeHtml(t.vibe)}</div>` : ''}

          <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px;">
            ${t.category ? `<span class="tag">${escapeHtml(t.category)}</span>` : ''}
            ${t.difficulty ? `<span class="difficulty ${t.difficulty}">${escapeHtml(t.difficulty)}</span>` : ''}
          </div>

          ${whenUse ? `
            <div class="section-label">When to use</div>
            <div class="tags">${whenUse}</div>` : ''}

          ${t.exampleSetup ? `
            <div class="section-label">How to do it</div>
            <div class="example">${escapeHtml(t.exampleSetup)}</div>` : ''}

          ${tools ? `
            <div class="section-label">Tools</div>
            <div class="tags">${tools}</div>` : ''}

          ${pairs ? `
            <div class="section-label">Pairs well with</div>
            <div class="tags">${pairs}</div>` : ''}

          ${archetypes ? `
            <div class="section-label">For creators like</div>
            <div class="tags">${archetypes}</div>` : ''}

          ${renderLinks(t)}

          ${t.sourceHint ? `<div class="source-hint">${escapeHtml(t.sourceHint)}</div>` : ''}
        </div>
      `;
    }

    refreshBtn.addEventListener('click', async () => {
      if (!confirm('Refresh trending techniques feed? Costs ~$0.40 (Exa + Sonnet). Takes 60-90s.')) return;
      refreshBtn.disabled = true;
      refreshBtn.innerHTML = '<span class="spinner"></span> Scanning…';
      try {
        const res = await fetch('/api/trending-techniques/refresh', { method: 'POST' });
        const json = await res.json();
        if (!json.success) throw new Error(json.error);
        alert(`Done — ${json.data.editCount} edits + ${json.data.sfxCount} SFX from ${json.data.sourceCount} articles.`);
        load();
      } catch (err) {
        alert('Refresh failed: ' + err.message);
      } finally {
        refreshBtn.disabled = false;
        refreshBtn.innerHTML = '✨ Refresh feed';
      }
    });

    searchInput.addEventListener('input', render);
    difficultyFilter.addEventListener('change', render);

    function renderLinks(t) {
      const l = t.links || {};
      const pills = [];
      if (l.tutorial) pills.push(`<a class="link-pill tutorial" href="${escapeHtml(l.tutorial)}" target="_blank" rel="noopener">🎓 Tutorial</a>`);
      if (l.example)  pills.push(`<a class="link-pill example"  href="${escapeHtml(l.example)}"  target="_blank" rel="noopener">▶ Example</a>`);
      if (l.tiktok)   pills.push(`<a class="link-pill tiktok"   href="${escapeHtml(l.tiktok)}"   target="_blank" rel="noopener">🎵 TikTok</a>`);
      if (l.youtube)  pills.push(`<a class="link-pill youtube"  href="${escapeHtml(l.youtube)}"  target="_blank" rel="noopener">▶ YouTube</a>`);
      if (!pills.length) return '';
      const label = t.type === 'sfx' ? 'Listen / use' : 'See it in action';
      return `<div class="section-label">${label}</div><div class="link-row">${pills.join('')}</div>`;
    }

    function escapeHtml(s) {
      return String(s || '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    }

    load();
  </script>
</body>
</html>
