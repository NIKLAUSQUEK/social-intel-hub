    cursor: pointer;
  }
  .pill-row .pill:hover { border-color: var(--accent); transform: translateY(-1px); }

  .meta-strip {
    margin-top: 64px;
    display: flex; gap: 26px;
    flex-wrap: wrap;
    color: var(--dim);
    font-size: 13px;
  }
  .meta-strip span strong { color: var(--text); font-weight: 600; }

  /* ── Section base ─────────────────────────────── */
  section.block {
    padding: 80px 28px;
    border-top: 1px solid var(--line);
    position: relative;
  }
  .section-tag {
    display: inline-block;
    color: var(--accent);
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-weight: 700;
    margin-bottom: 12px;
    padding: 4px 10px;
    background: var(--accent-soft);
    border-radius: 4px;
  }
  .section-title {
    font-size: clamp(36px, 5vw, 64px);
    font-weight: 900;
    letter-spacing: -0.035em;
    line-height: 1.05;
    margin-bottom: 22px;
    max-width: 1000px;
  }
  .section-lead {
    font-size: clamp(16px, 1.4vw, 19px);
    color: var(--muted);
    max-width: 760px;
    line-height: 1.55;
  }

  /* ── Snapshot cards (Uber Eats restaurant detail) ── */
  .snap-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
    margin-top: 40px;
  }
  @media (max-width: 880px) { .snap-grid { grid-template-columns: 1fr; } }
  .snap-card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 28px;
  }
  .snap-card.score {
    background: linear-gradient(135deg, var(--panel), var(--panel-2));
    grid-column: span 2;
    text-align: center;
  }
  @media (max-width: 880px) { .snap-card.score { grid-column: span 1; } }
  .score-num {
    font-size: clamp(80px, 12vw, 144px);
    font-weight: 900;
    background: linear-gradient(135deg, var(--accent), var(--cyan));
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    line-height: 1;
    letter-spacing: -0.04em;
  }
  .score-label {
    color: var(--muted);
    font-size: 14px;
    margin-top: 12px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .stack-list { list-style: none; padding: 0; }
  .stack-list li {
    padding: 18px 0;
    border-bottom: 1px solid var(--line);
    display: flex; gap: 16px;
    align-items: flex-start;
  }
  .stack-list li:last-child { border-bottom: none; }
  .stack-list .num {
    font-weight: 800;
    color: var(--accent);
    font-size: 18px;
    flex-shrink: 0;
    width: 28px;
    font-family: 'JetBrains Mono', monospace;
  }
  .stack-list h4 { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  .stack-list p { color: var(--muted); font-size: 14px; line-height: 1.55; }
  .card-title {
    font-size: 12px; color: var(--muted);
    letter-spacing: 0.1em; text-transform: uppercase;
    font-weight: 700; margin-bottom: 14px;
  }
  .card-title.warn { color: var(--err); }
  .card-title.ok { color: var(--ok); }

  /* ── Audience section ─────────────────────────── */
  .icp-card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 32px;
    margin-bottom: 14px;
  }
  .icp-card.primary { border-color: rgba(124,92,255,0.3); background: linear-gradient(135deg, var(--panel), rgba(124,92,255,0.05)); }
  .icp-name {
    display: inline-flex; align-items: center; gap: 10px;
    background: var(--accent-soft);
    color: var(--accent);
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .icp-name::before { content: '◆'; font-size: 8px; }
  .icp-card h3 { font-size: 26px; font-weight: 800; letter-spacing: -0.025em; margin-bottom: 14px; }
  .icp-card .demo { color: var(--muted); font-size: 15px; margin-bottom: 18px; }
  .icp-card .psycho {
    font-size: 15px; line-height: 1.6;
    border-left: 3px solid var(--accent);
    padding-left: 18px;
    margin: 18px 0;
  }
  .pain-list {
    list-style: none; padding: 0;
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px; margin-top: 14px;
  }
  @media (max-width: 720px) { .pain-list { grid-template-columns: 1fr; } }
  .pain-list li {
    background: rgba(255,255,255,0.03);
    padding: 12px 14px;
    border-radius: 8px;
    font-size: 14px;
    color: var(--text);
    border-left: 2px solid var(--err);
  }
  .where-tag {
    margin-top: 20px;
    padding: 14px 18px;
    background: var(--bg);
    border-radius: 10px;
    font-size: 13px;
    color: var(--muted);
  }
  .where-tag strong { color: var(--cyan); }
  .audience-insight {
    margin-top: 26px;
    padding: 22px 26px;
    border-radius: 14px;
    background: linear-gradient(135deg, rgba(124,92,255,0.08), rgba(34,211,238,0.04));
    border: 1px solid rgba(124,92,255,0.2);
    font-size: 17px;
    font-weight: 500;
    line-height: 1.55;
  }

  /* ── Hooks library (UberEats menu items) ─────── */
  .hook-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 16px;
    margin-top: 40px;
  }
  .hook-card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 26px;
    position: relative;
    transition: all 0.2s;
  }
  .hook-card:hover { transform: translateY(-2px); border-color: var(--accent); }
  .hook-card .hook-id {
    position: absolute;
    top: 18px; right: 22px;
    color: var(--dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
  }
  .hook-card h4 {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.02em;
    margin-bottom: 8px;
    padding-right: 36px;
  }
  .hook-card .structure {
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 16px;
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    padding: 8px 12px;
    border-radius: 6px;
  }
  .hook-card .example {
    font-style: italic;
    background: var(--accent-soft);
    border-left: 3px solid var(--accent);
    padding: 14px 16px;
    border-radius: 6px;
    margin-bottom: 18px;
    font-size: 15px;
    line-height: 1.5;
  }
  .hook-card .meta {
    display: flex; justify-content: space-between; align-items: center;
    padding-top: 14px;
    border-top: 1px solid var(--line);
  }
  .hook-card .lift {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    font-weight: 800;
    color: var(--ok);
  }
  .hook-card .best-for {
    display: flex; gap: 6px; flex-wrap: wrap;
  }
  .hook-card .best-for span {
    font-size: 11px;
    color: var(--muted);
    background: var(--bg);
    padding: 4px 10px;
    border-radius: 999px;
  }

  /* ── Funnel visual (UberEats categorical layout) ── */
  .funnel-wrap {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    margin-top: 40px;
  }
  @media (max-width: 880px) { .funnel-wrap { grid-template-columns: 1fr; } }
  .funnel-card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 28px;
    border-top: 4px solid;
    display: flex; flex-direction: column;
  }
  .funnel-card.tof { border-top-color: var(--cyan); }
  .funnel-card.mof { border-top-color: var(--warn); }
  .funnel-card.bof { border-top-color: var(--ok); }
  .funnel-tier {
    font-size: 12px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .funnel-card.tof .funnel-tier { color: var(--cyan); }
  .funnel-card.mof .funnel-tier { color: var(--warn); }
  .funnel-card.bof .funnel-tier { color: var(--ok); }
  .funnel-card h3 {
    font-size: 22px; font-weight: 800; letter-spacing: -0.02em;
    line-height: 1.2; margin-bottom: 12px;
  }
  .funnel-card .frequency {
    font-size: 32px;
    font-weight: 900;
    margin: 14px 0;
    font-family: 'JetBrains Mono', monospace;
  }
  .funnel-card.tof .frequency { color: var(--cyan); }
  .funnel-card.mof .frequency { color: var(--warn); }
  .funnel-card.bof .frequency { color: var(--ok); }
  .funnel-card .frequency-label {
    font-size: 11px; color: var(--muted);
    letter-spacing: 0.1em; text-transform: uppercase;
    margin-top: -8px; margin-bottom: 18px;
  }
  .funnel-card .formats {
    display: flex; flex-wrap: wrap; gap: 6px;
    margin-bottom: 18px;
  }
  .funnel-card .formats span {
    font-size: 11px;
    background: var(--bg);
    padding: 5px 10px;
    border-radius: 4px;
    color: var(--muted);
  }
  .funnel-card .deliv {
    font-size: 13px;
    color: var(--text);
    padding: 14px;
    background: var(--bg);
    border-radius: 10px;
    line-height: 1.5;
    margin-top: auto;
  }

  /* ── Competitor cards ─────────────────────────── */
  .comp-list {
    margin-top: 40px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .comp-card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 28px;
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    gap: 30px;
  }
  @media (max-width: 880px) { .comp-card { grid-template-columns: 1fr; } }
  .comp-card h3 { font-size: 24px; font-weight: 800; margin-bottom: 14px; letter-spacing: -0.02em; }
  .comp-section { margin-bottom: 14px; }
  .comp-section .label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .comp-section.win .label { color: var(--ok); }
  .comp-section.gap .label { color: var(--warn); }
  .comp-section p { font-size: 14px; line-height: 1.55; color: var(--text); }
  .playbook {
    background: var(--accent-soft);
    border-left: 3px solid var(--accent);
    padding: 16px 20px;
    border-radius: 8px;
    align-self: stretch;
  }
  .playbook .label {
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .playbook p { font-size: 14px; line-height: 1.55; color: var(--text); }

  /* ── Trend gaps cards ─────────────────────────── */
  .trend-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 14px;
    margin-top: 40px;
  }
  .trend-card {
    background: linear-gradient(135deg, var(--panel), rgba(244,114,182,0.04));
    border: 1px solid rgba(244,114,182,0.2);
    border-radius: 16px;
    padding: 24px;
  }
  .trend-card h4 { font-size: 18px; font-weight: 800; margin-bottom: 10px; line-height: 1.3; }
  .trend-card .signal {
    font-size: 13px; color: var(--muted); margin-bottom: 14px;
    line-height: 1.5;
  }
  .trend-card .play {
    background: var(--bg);
    border-left: 3px solid var(--pink);
    padding: 12px 14px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 10px;
  }
  .trend-card .shelf {
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 0.05em;
    font-family: 'JetBrains Mono', monospace;
  }

  /* ── A/B testing process timeline ─────────────── */
  .ab-block {
    margin-top: 40px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 36px;
  }
  .ab-block h3 { font-size: 24px; font-weight: 800; margin-bottom: 8px; letter-spacing: -0.02em; }
  .ab-block .principle {
    color: var(--muted); font-size: 16px; line-height: 1.55;
    margin-bottom: 28px; max-width: 700px;
  }
  .ab-process {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 14px;
    margin-bottom: 28px;
  }
  .ab-step {
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 18px;
    position: relative;
  }
  .ab-step .step-num {
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .ab-step h4 { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
  .ab-step p { font-size: 13px; color: var(--muted); line-height: 1.5; }
  .ab-result {
    background: rgba(74,222,128,0.06);
    border: 1px solid rgba(74,222,128,0.2);
    border-radius: 12px;
    padding: 18px 22px;
    display: flex; gap: 12px; align-items: flex-start;
  }
  .ab-result::before {
    content: '✓';
    color: var(--ok);
    font-weight: 800;
    font-size: 18px;
    flex-shrink: 0;
  }
  .ab-result-text { font-size: 14px; line-height: 1.5; }

  /* ── Differentiation grid ─────────────────────── */
  .diff-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 14px;
    margin-top: 40px;
  }
  .diff-card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 26px;
  }
  .diff-card .icon-num {
    width: 44px; height: 44px;
    border-radius: 12px;
    background: var(--accent-soft);
    color: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 14px;
    margin-bottom: 18px;
  }
  .diff-card h4 { font-size: 19px; font-weight: 800; margin-bottom: 10px; line-height: 1.3; }
  .diff-card p { color: var(--muted); font-size: 14px; line-height: 1.55; }

  /* ── Pricing (Uber Eats checkout-style cards) ─── */
  .price-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-top: 40px;
    align-items: stretch;
  }
  @media (max-width: 980px) { .price-grid { grid-template-columns: 1fr; } }
  .price-card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 32px;
    display: flex; flex-direction: column;
    position: relative;
  }
  .price-card.best {
    background: linear-gradient(135deg, var(--panel-2), rgba(124,92,255,0.08));
    border-color: var(--accent);
    transform: scale(1.02);
  }
  @media (max-width: 980px) { .price-card.best { transform: none; } }
  .price-card.best::before {
    content: 'MOST POPULAR';
    position: absolute;
    top: -10px; left: 24px;
    background: var(--accent);
    color: white;
    padding: 5px 12px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.15em;
  }
  .price-card .tier-name { font-size: 14px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; font-weight: 700; }
  .price-card .tier-tag { color: var(--text); font-size: 16px; margin: 4px 0 22px; opacity: 0.85; }
  .price-card .price-num {
    font-size: 56px;
    font-weight: 900;
    letter-spacing: -0.04em;
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 28px;
  }
  .price-card .price-num .currency { font-size: 22px; color: var(--muted); margin-right: 4px; vertical-align: top; font-weight: 600; }
  .price-card .price-num .suffix { font-size: 16px; color: var(--muted); font-weight: 500; }
  .price-card ul {
    list-style: none; padding: 0;
    flex: 1; display: flex; flex-direction: column; gap: 10px;
  }
  .price-card ul li {
    font-size: 14px;
    line-height: 1.45;
    padding-left: 26px;
    position: relative;
    color: var(--text);
  }
  .price-card ul li::before {
    content: '✓';
    position: absolute;
    left: 0;
    color: var(--accent);
    font-weight: 800;
  }

  .addons {
    margin-top: 32px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 26px;
  }
  .addons-title {
    font-size: 12px; color: var(--muted);
    letter-spacing: 0.1em; text-transform: uppercase;
    font-weight: 700; margin-bottom: 14px;
  }
  .addons-list {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  @media (max-width: 720px) { .addons-list { grid-template-columns: 1fr; } }
  .addon-row {
    display: flex; justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid var(--line);
    font-size: 14px;
  }
  .addon-row .price { color: var(--accent); font-family: 'JetBrains Mono', monospace; font-weight: 700; }
  .pricing-billing {
    margin-top: 20px;
    color: var(--muted);
    font-size: 13px;
    text-align: center;
  }
  .guarantee {
    margin-top: 20px;
    padding: 18px 22px;
    background: rgba(74,222,128,0.05);
    border: 1px dashed rgba(74,222,128,0.3);
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.55;
  }

  /* ── Roadmap horizontal timeline ──────────────── */
  .timeline {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    margin-top: 40px;
    position: relative;
  }
  @media (max-width: 880px) { .timeline { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 480px) { .timeline { grid-template-columns: 1fr; } }
  .timeline-step {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 22px;
    position: relative;
  }
  .timeline-step .label {
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.05em;
    margin-bottom: 12px;
  }
  .timeline-step h4 { font-size: 18px; font-weight: 800; margin-bottom: 8px; }
  .timeline-step p { color: var(--muted); font-size: 13px; line-height: 1.5; }

  /* ── Final CTA ────────────────────────────────── */
  .cta-block {
    text-align: center;
    padding: 100px 28px 80px;
    background:
      radial-gradient(ellipse at center, rgba(124,92,255,0.18), transparent 60%);
    border-top: 1px solid var(--line);
  }
  .cta-block h2 {
    font-size: clamp(40px, 5vw, 72px);
    font-weight: 900;
    letter-spacing: -0.04em;
    line-height: 1.05;
    margin-bottom: 28px;
  }
  .cta-steps {
    display: flex; gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
    margin: 36px 0;
  }
  .cta-step {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 18px 22px;
    max-width: 280px;
    text-align: left;
    display: flex; gap: 14px; align-items: flex-start;
  }
  .cta-step .num {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--accent);
    color: white;
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 13px;
    flex-shrink: 0;
  }
  .cta-step p { font-size: 14px; line-height: 1.5; }
  .cta-bar {
    margin-top: 36px;
    display: inline-flex; align-items: center; gap: 12px;
    padding: 14px 28px;
    background: var(--accent);
    color: white;
    border-radius: 999px;
    font-weight: 700;
    font-size: 16px;
    text-decoration: none;
    box-shadow: 0 12px 40px var(--accent-glow);
    transition: transform 0.15s;
  }
  .cta-bar:hover { transform: translateY(-2px); }
  .cta-contact {
    margin-top: 18px; color: var(--muted); font-size: 14px;
  }
  .cta-contact a { color: var(--accent); text-decoration: none; font-weight: 600; }

  /* ── Reveal animations ────────────────────────── */
  .reveal {
    opacity: 0;
    transform: translateY(28px);
    transition: opacity 0.7s ease-out, transform 0.7s ease-out;
  }
  .reveal.in {
    opacity: 1;
    transform: translateY(0);
  }
  .reveal.delay-1 { transition-delay: 0.08s; }
  .reveal.delay-2 { transition-delay: 0.16s; }
  .reveal.delay-3 { transition-delay: 0.24s; }
  .reveal.delay-4 { transition-delay: 0.32s; }

  /* ── Print: clean PDF export ──────────────────── */
  @media print {
    body { background: white; color: #0B1020; }
    .topnav { display: none; }
    section.block, .hero, .cta-block { padding: 32px 24px; page-break-inside: avoid; background: white !important; }
    .hero { min-height: auto; }
    .reveal { opacity: 1 !important; transform: none !important; }
    .hook-card, .funnel-card, .price-card, .diff-card, .trend-card, .icp-card, .snap-card, .ab-block, .timeline-step, .comp-card, .addons {
      background: white !important; border: 1px solid #E2E8F0 !important; box-shadow: none !important;
    }
    .price-card.best { transform: none !important; background: #F8F9FF !important; }
    .hero-title, .section-title, .cta-block h2 { color: #0B1020 !important; }
    .hero-title .accent { -webkit-text-fill-color: var(--accent) !important; }
    .hero-stat { background: #F8F9FF !important; }
    .audience-insight { background: #F8F9FF !important; }
  }
</style>
</head>
<body>

<!-- Top nav -->
<nav class="topnav">
  <div class="brand-mark">
    <span>TITAN<span class="dot"></span>AI</span>
  </div>
  <div class="topnav-meta" id="topnavMeta"></div>
</nav>

<!-- Render target -->
<main id="root"></main>

<script>
  // Helper to escape HTML
  function esc(s) { return String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

  function render(d) {
    const root = document.getElementById('root');

    // Topnav meta
    document.getElementById('topnavMeta').innerHTML =
      `<strong>${esc(d.meta.clientName)}</strong> · ${esc(d.meta.industry)} · ${esc(d.meta.proposalId || '')}`;
    document.title = `TITAN.AI — Proposal · ${d.meta.clientName}`;

    let html = '';

    // ── Hero
    html += `
      <section class="hero">
        <div class="hero-eyebrow reveal">PROPOSAL · ${esc(d.meta.industry)} · ${esc(d.meta.date)}</div>
        <h1 class="hero-title reveal delay-1">${esc(d.hero.tagline)} <span class="accent">${esc(d.hero.taglineAccent || '')}</span></h1>
        <p class="hero-sub reveal delay-2">${esc(d.hero.subline)}</p>
        ${d.hero.headlineStat ? `
          <div class="hero-stat reveal delay-3">
            <span class="num">${esc(d.hero.headlineStat)}</span>
            <span class="label">${esc(d.hero.headlineStatLabel || '')}</span>
          </div>` : ''}
        ${d.categoryPills?.length ? `
          <div class="pill-row reveal delay-3">
            ${d.categoryPills.map(p => `<div class="pill">${esc(p)}</div>`).join('')}
          </div>` : ''}
        <div class="meta-strip reveal delay-4">
          <span><strong>Prepared for</strong> · ${esc(d.meta.preparedFor)}</span>
          <span><strong>Prepared by</strong> · ${esc(d.meta.preparedBy)}</span>
          <span><strong>Valid until</strong> · ${esc(d.meta.validUntil)}</span>
        </div>
      </section>
    `;

    // ── 01 Snapshot
    if (d.snapshot) {
      html += `
        <section class="block">
          <div class="section-tag reveal">01 · OPPORTUNITY SNAPSHOT</div>
          <h2 class="section-title reveal delay-1">Where you're winning,<br/>where you're leaking, and what to fix first.</h2>
          <p class="section-lead reveal delay-2">${esc(d.snapshot.currentState)}</p>
          <div class="snap-grid">
            <div class="snap-card score reveal delay-2">
              <div class="card-title">Opportunity Score</div>
              <div class="score-num">${esc(d.snapshot.opportunityScore)}<span style="font-size:0.4em;color:var(--muted);">/100</span></div>
              <div class="score-label">Based on audience signal · format mix · funnel completeness · competitor gap</div>
            </div>
            <div class="snap-card reveal delay-3">
              <div class="card-title ok">TOP 3 WINS TO PRESS</div>
              <ul class="stack-list">
                ${(d.snapshot.topThreeWins || []).map((w, i) => `
                  <li>
                    <span class="num">0${i+1}</span>
                    <div><h4>${esc(w.title)}</h4><p>${esc(w.detail)}</p></div>
                  </li>
                `).join('')}
              </ul>
            </div>
            <div class="snap-card reveal delay-4">
              <div class="card-title warn">TOP 3 RISKS TO PATCH</div>
              <ul class="stack-list">
                ${(d.snapshot.topThreeRisks || []).map((w, i) => `
                  <li>
                    <span class="num">0${i+1}</span>
                    <div><h4>${esc(w.title)}</h4><p>${esc(w.detail)}</p></div>
                  </li>
                `).join('')}
              </ul>
            </div>
          </div>
        </section>
      `;
    }

    // ── 02 Audience
    if (d.audience) {
      html += `
        <section class="block">
          <div class="section-tag reveal">02 · AUDIENCE & PAIN POINTS</div>
          <h2 class="section-title reveal delay-1">Who you're really talking to,<br/>and what's stopping them.</h2>
          <p class="section-lead reveal delay-2">${esc(d.audience.audienceInsight || '')}</p>
          ${d.audience.primaryICP ? `
            <div class="icp-card primary reveal delay-3">
              <div class="icp-name">PRIMARY ICP</div>
              <h3>${esc(d.audience.primaryICP.name)}</h3>
              <div class="demo">${esc(d.audience.primaryICP.demo)}</div>
              <div class="psycho">${esc(d.audience.primaryICP.psychographic)}</div>
              <div style="font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;font-weight:700;margin-bottom:8px;">Pain points</div>
              <ul class="pain-list">
                ${(d.audience.primaryICP.painPoints || []).map(p => `<li>${esc(p)}</li>`).join('')}
              </ul>
              ${d.audience.primaryICP.where ? `<div class="where-tag"><strong>Where they live online</strong> · ${esc(d.audience.primaryICP.where)}</div>` : ''}
            </div>` : ''}
          ${d.audience.secondaryICP ? `
            <div class="icp-card reveal delay-4">
              <div class="icp-name">SECONDARY ICP</div>
              <h3>${esc(d.audience.secondaryICP.name)}</h3>
              <div class="demo">${esc(d.audience.secondaryICP.demo)}</div>
              <div class="psycho">${esc(d.audience.secondaryICP.tldr || '')}</div>
            </div>` : ''}
        </section>
      `;
    }

    // ── 03 Hooks
    if (d.hooks?.library?.length) {
      html += `
        <section class="block">
          <div class="section-tag reveal">03 · HOOK ARCHITECTURE</div>
          <h2 class="section-title reveal delay-1">Five hook formulas.<br/>Tested. Ranked. Yours.</h2>
          <p class="section-lead reveal delay-2">${esc(d.hooks.philosophy)}</p>
          <div class="hook-grid">
            ${d.hooks.library.map((h, i) => `
              <div class="hook-card reveal" style="transition-delay:${0.1 + i * 0.05}s">
                <div class="hook-id">${esc(h.id || ('0'+(i+1)))}</div>
                <h4>${esc(h.name)}</h4>
                <div class="structure">${esc(h.structure)}</div>
                <div class="example">"${esc(h.example)}"</div>
                <div class="meta">
                  <div class="best-for">${(h.bestFor || []).map(b => `<span>${esc(b)}</span>`).join('')}</div>
                  ${h.retentionLift ? `<div class="lift">${esc(h.retentionLift)}</div>` : ''}
                </div>
              </div>
            `).join('')}
          </div>
        </section>
      `;
    }

    // ── 04 Funnel
    if (d.funnel) {
      html += `
        <section class="block">
          <div class="section-tag reveal">04 · FUNNEL ENGINE</div>
          <h2 class="section-title reveal delay-1">Three funnel layers,<br/>three jobs, three rules.</h2>
          <p class="section-lead reveal delay-2">${esc(d.funnel.philosophy)}</p>
          <div class="funnel-wrap">
            ${['tof', 'mof', 'bof'].map((tier, idx) => {
              const f = d.funnel[tier];
              if (!f) return '';
              return `
                <div class="funnel-card ${tier} reveal" style="transition-delay:${0.1 + idx * 0.08}s">
                  <div class="funnel-tier">${esc(f.label)}</div>
                  <h3>${esc(f.purpose)}</h3>
                  <div class="frequency">${esc(f.frequency)}</div>
                  <div class="frequency-label">of cadence</div>
                  <div class="formats">${(f.formats || []).map(fmt => `<span>${esc(fmt)}</span>`).join('')}</div>
                  <div class="deliv"><strong>Deliverables · </strong>${esc(f.deliverables || '')}</div>
                </div>
              `;
            }).join('')}
          </div>
        </section>
      `;
    }

    // ── 05 Competitor benchmarks
    if (d.competitorBenchmarks?.length) {
      html += `
        <section class="block">
          <div class="section-tag reveal">05 · COMPETITOR PLAYBOOKS</div>
          <h2 class="section-title reveal delay-1">What your rivals do well,<br/>where they leave openings.</h2>
          <div class="comp-list">
            ${d.competitorBenchmarks.map((c, i) => `
              <div class="comp-card reveal" style="transition-delay:${0.05 * i}s">
                <div>
                  <h3>${esc(c.name)}</h3>
                  <div class="comp-section win">
                    <div class="label">What they're winning at</div>
                    <p>${esc(c.winning)}</p>
                  </div>
                  <div class="comp-section">
                    <div class="label">Where they win</div>
                    <p>${esc(c.where)}</p>
                  </div>
                  <div class="comp-section gap">
                    <div class="label">The gap they leave</div>
                    <p>${esc(c.gap)}</p>
                  </div>
                </div>
                <div class="playbook">
                  <div class="label">Our counter-play</div>
                  <p>${esc(c.playbook)}</p>
                </div>
              </div>
            `).join('')}
          </div>
        </section>
      `;
    }

    // ── 06 Trend gaps
    if (d.trendGaps?.length) {
      html += `
        <section class="block">
          <div class="section-tag reveal">06 · TREND GAPS YOU CAN OWN</div>
          <h2 class="section-title reveal delay-1">Three trends moving now.<br/>Three plays you can ship this week.</h2>
          <div class="trend-grid">
            ${d.trendGaps.map((t, i) => `
              <div class="trend-card reveal" style="transition-delay:${0.05 * i}s">
                <h4>${esc(t.trend)}</h4>
                <div class="signal">${esc(t.signal)}</div>
                <div class="play"><strong>Your play · </strong>${esc(t.yourPlay)}</div>
                <div class="shelf">SHELF · ${esc(t.shelfLife)}</div>
              </div>
            `).join('')}
          </div>
        </section>
      `;
    }

    // ── 06.5 Education — 2026 Playbook (non-generic)
    if (d.education) {
      html += `
        <section class="block">
          <div class="section-tag reveal">06.5 · 2026 PLAYBOOK</div>
          <h2 class="section-title reveal delay-1">${esc(d.education.title || 'What is actually working in 2026.')}</h2>
          <p class="section-lead reveal delay-2">${esc(d.education.intro || '')}</p>

          ${d.education.pillars?.length ? `
            <div style="margin-top:36px;">
              <div class="section-tag reveal" style="margin-bottom:14px;">CONTENT PILLAR SYSTEM</div>
              <div class="hook-grid">
                ${d.education.pillars.map((p, i) => `
                  <div class="hook-card reveal" style="transition-delay:${0.05 * i}s">
                    <div class="hook-id">${esc(p.weight || '')}</div>
                    <h4>${esc(p.name)}</h4>
                    <div class="structure">${esc(p.purpose || '')}</div>
                    <div class="example">"${esc(p.example || '')}"</div>
                  </div>
                `).join('')}
              </div>
            </div>` : ''}

          ${d.education.aesthetics?.length ? `
            <div style="margin-top:48px;">
              <div class="section-tag reveal" style="margin-bottom:14px;">AESTHETIC CODES THAT CONVERT</div>
              <div class="trend-grid">
                ${d.education.aesthetics.map((a, i) => `
                  <div class="trend-card reveal" style="transition-delay:${0.05 * i}s">
                    <h4>${esc(a.name)}</h4>
                    <div class="signal"><strong>Look · </strong>${esc(a.look || '')}</div>
                    <div class="play"><strong>Use when · </strong>${esc(a.useWhen || '')}</div>
                    <div class="shelf">${esc(a.signal || '')}</div>
                  </div>
                `).join('')}
              </div>
            </div>` : ''}

          ${d.education.repurposing ? `
            <div class="ab-block reveal" style="margin-top:48px;">
              <h3>${esc(d.education.repurposing.title || 'The 1 → 9 repurposing tree')}</h3>
              <p class="principle">${esc(d.education.repurposing.principle || '')}</p>
              <div class="ab-process">
                ${(d.education.repurposing.tree || []).map((node, i) => `
                  <div class="ab-step">
                    <div class="step-num">${esc(node.from || ('NODE ' + (i+1)))}</div>
                    <h4>${esc(node.to)}</h4>
                    <p>${esc(node.detail)}</p>
                  </div>
                `).join('')}
              </div>
            </div>` : ''}

          ${d.education.formatIntel?.length ? `
            <div style="margin-top:48px;">
              <div class="section-tag reveal" style="margin-bottom:14px;">2026 FORMAT VELOCITY</div>
              <div class="comp-list">
                ${d.education.formatIntel.map((f, i) => `
                  <div class="comp-card reveal" style="transition-delay:${0.04 * i}s">
                    <div>
                      <h3>${esc(f.format)}</h3>
                      <div class="comp-section win"><div class="label">Why it is winning right now</div><p>${esc(f.why)}</p></div>
                      <div class="comp-section"><div class="label">Watch-out</div><p>${esc(f.watchOut || '')}</p></div>
                    </div>
                    <div class="playbook"><div class="label">How we apply it for you</div><p>${esc(f.application)}</p></div>
                  </div>
                `).join('')}
              </div>
            </div>` : ''}
        </section>
      `;
    }

    // ── 07 A/B testing philosophy
    if (d.abPhilosophy) {
      html += `
        <section class="block">
          <div class="section-tag reveal">07 · DATA-DRIVEN PROCESS</div>
          <h2 class="section-title reveal delay-1">We don't ship and hope.<br/>We test and double down.</h2>
          <div class="ab-block reveal delay-2">
            <h3>${esc(d.abPhilosophy.title)}</h3>
            <p class="principle">${esc(d.abPhilosophy.principle)}</p>
            <div class="ab-process">
              ${(d.abPhilosophy.process || []).map((s, i) => `
                <div class="ab-step">
                  <div class="step-num">STEP ${i + 1}</div>
                  <h4>${esc(s.step)}</h4>
                  <p>${esc(s.detail)}</p>
                </div>
              `).join('')}
            </div>
            ${d.abPhilosophy.exampleResult ? `
              <div class="ab-result"><div class="ab-result-text"><strong>Real result · </strong>${esc(d.abPhilosophy.exampleResult)}</div></div>
            ` : ''}
          </div>
        </section>
      `;
    }

    // ── 08 Differentiation
    if (d.differentiation?.length) {
      html += `
        <section class="block">
          <div class="section-tag reveal">08 · WHY TITAN.AI</div>
          <h2 class="section-title reveal delay-1">Six things normal agencies<br/>simply don't have.</h2>
          <div class="diff-grid">
            ${d.differentiation.map((diff, i) => `
              <div class="diff-card reveal" style="transition-delay:${0.04 * i}s">
                <div class="icon-num">${esc(diff.iconChar || '0'+(i+1))}</div>
                <h4>${esc(diff.claim)}</h4>
                <p>${esc(diff.detail)}</p>
              </div>
            `).join('')}
          </div>
        </section>
      `;
    }

    // ── 08.5 Portfolio / Results
    if (d.portfolio?.length) {
      html += `
        <section class="block">
          <div class="section-tag reveal">08.5 · RESULTS WE HAVE SHIPPED</div>
          <h2 class="section-title reveal delay-1">Real clients.<br/>Real numbers. No vanity.</h2>
          <div class="comp-list">
            ${d.portfolio.map((p, i) => `
              <div class="comp-card reveal" style="transition-delay:${0.05 * i}s">
                <div>
                  <h3>${esc(p.client)}</h3>
                  <div class="comp-section"><div class="label">${esc(p.industry || 'Sector')}</div><p>${esc(p.brief || '')}</p></div>
                  <div class="comp-section win"><div class="label">What we did</div><p>${esc(p.intervention || '')}</p></div>
                </div>
                <div class="playbook">
                  <div class="label">Result</div>
                  <p style="font-size:22px;font-weight:800;color:var(--accent);font-family:'JetBrains Mono',monospace;margin-bottom:8px;">${esc(p.headlineResult || '')}</p>
                  <p>${esc(p.detail || '')}</p>
                </div>
              </div>
            `).join('')}
          </div>
        </section>
      `;
    }

    // ── 09 Roadmap
    if (d.roadmap) {
      html += `
        <section class="block">
          <div class="section-tag reveal">09 · YOUR FIRST 90 DAYS</div>
          <h2 class="section-title reveal delay-1">${esc(d.roadmap.title)}</h2>
          <div class="timeline">
            ${(d.roadmap.phases || []).map((p, i) => `
              <div class="timeline-step reveal" style="transition-delay:${0.06 * i}s">
                <div class="label">${esc(p.label)}</div>
                <h4>${esc(p.title)}</h4>
                <p>${esc(p.outcome)}</p>
              </div>
            `).join('')}
          </div>
        </section>
      `;
    }

    // ── 10 Pricing
    if (d.pricing?.tiers?.length) {
      html += `
        <section class="block">
          <div class="section-tag reveal">10 · PRICING</div>
          <h2 class="section-title reveal delay-1">Pick the tier that fits<br/>your stage right now.</h2>
          <p class="section-lead reveal delay-2">${esc(d.pricing.billing || '')}</p>
          <div class="price-grid">
            ${d.pricing.tiers.map((t, i) => `
              <div class="price-card ${t.best ? 'best' : ''} reveal" style="transition-delay:${0.08 * i}s">
                <div class="tier-name">${esc(t.name)}</div>
                <div class="tier-tag">${esc(t.tagline)}</div>
                <div class="price-num"><span class="currency">${esc(d.pricing.currency || 'SGD')}</span>${esc(t.price)}<span class="suffix">${esc(t.priceSuffix || '/month')}</span></div>
                <ul>
                  ${(t.includes || []).map(inc => `<li>${esc(inc)}</li>`).join('')}
                </ul>
              </div>
            `).join('')}
          </div>
          ${d.pricing.addOns?.length ? `
            <div class="addons reveal">
              <div class="addons-title">Optional add-ons · stackable on any tier</div>
              <div class="addons-list">
                ${d.pricing.addOns.map(a => `
                  <div class="addon-row"><span>${esc(a.name)}</span><span class="price">${esc(a.price)}</span></div>
                `).join('')}
              </div>
            </div>` : ''}
          ${d.pricing.guarantee ? `
            <div class="guarantee reveal">${esc(d.pricing.guarantee)}</div>` : ''}
        </section>
      `;
    }

    // ── 11 CTA
    if (d.nextSteps) {
      html += `
        <section class="cta-block">
          <h2 class="reveal">${esc(d.nextSteps.title || 'Ready to start?')}</h2>
          <div class="cta-steps">
            ${(d.nextSteps.steps || []).map((s, i) => `
              <div class="cta-step reveal" style="transition-delay:${0.1 * i}s"><span class="num">${esc(s.step || (i+1))}</span><p>${esc(s.action)}</p></div>
            `).join('')}
          </div>
          ${d.nextSteps.ctaLink ? `<a class="cta-bar reveal" href="${esc(d.nextSteps.ctaLink)}" target="_blank">${esc(d.nextSteps.cta || 'Book a call')} →</a>` : ''}
          ${d.nextSteps.ctaEmail ? `<div class="cta-contact reveal">Or reply directly: <a href="mailto:${esc(d.nextSteps.ctaEmail)}">${esc(d.nextSteps.ctaEmail)}</a></div>` : ''}
        </section>
      `;
    }

    root.innerHTML = html;

    // Reveal observer
    const io = new IntersectionObserver((entries) => {
      for (const e of entries) {
        if (e.isIntersecting) {
          e.target.classList.add('in');
          io.unobserve(e.target);
        }
      }
    }, { threshold: 0.12, rootMargin: '0px 0px -50px 0px' });
    document.querySelectorAll('.reveal').forEach(el => io.observe(el));
  }

  render(window.PROPOSAL_DATA);
</script>

</body>
</html>
